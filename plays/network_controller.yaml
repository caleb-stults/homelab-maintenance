- name: Update Network Controller
  hosts: network_controller
  become: yes
  vars:
    ansible_become_password: "{{ vault_become_pass }}"
  tasks:
    - name: Upgrade all packages
      apt: { update_cache: yes, upgrade: dist }
      register: apt_result

    - name: Update Pi-hole
      command: pihole -up
      when: not ansible_check_mode
      changed_when: true

    - name: Update UniFi Application
      apt: { name: unifi, state: latest }

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot Ubuntu Server
      reboot:
        msg: "Rebooting to apply kernel updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists and not ansible_check_mode