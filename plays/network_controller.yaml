- name: Update Network Controller
  hosts: network_controller
  become: yes
  vars:
    ansible_become_password: "{{ vault_become_pass }}"
  tasks:
    - name: 1. Force accept repository codename changes
      ansible.builtin.command: apt-get update --allow-releaseinfo-change
      changed_when: true

    - name: 2. Upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes
        dpkg_options: 'force-confold,force-confdef'

    - name: 3. Update Pi-hole
      command: pihole -up
      when: not ansible_check_mode
      changed_when: true

    - name: 4. Update UniFi Application
      apt: { name: unifi, state: latest }

    - name: 5. Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: 6. Reboot Ubuntu Server
      reboot:
        msg: "Rebooting to apply kernel updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists and not ansible_check_mode