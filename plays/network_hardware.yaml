---
- name: Update Network Hardware (Staging Method)
  hosts: network_gear
  gather_facts: false
  tasks:
    - name: 1. EdgeRouter - Trigger update check
      ansible.builtin.raw: /opt/vyatta/bin/vyatta-op-cmd-wrapper add system image check-version
      register: er_update
      when: inventory_hostname == 'edgerouter'
      ignore_errors: yes

    - name: 2. Access Point - Download firmware to /tmp
      ansible.builtin.raw: "curl -L http://dl.ui.com/unifi/firmware/U7PG2/current/firmware.bin -o /tmp/fwupdate.bin"
      register: ap_download
      when: inventory_hostname == 'access_point'
      ignore_errors: yes

    - name: 3. Access Point - Trigger upgrade from local file
      ansible.builtin.raw: "/usr/bin/syswrapper.sh upgrade2 &"
      register: ap_upgrade
      when: 
        - inventory_hostname == 'access_point'
        - ap_download.rc is defined and ap_download.rc == 0
      ignore_unreachable: yes
      ignore_errors: yes

    - name: 4. Determine if reboot is needed
      ansible.builtin.set_fact:
        needs_reboot: >-
          {{
            (inventory_hostname == 'edgerouter' and er_update.stdout is defined and 'Done' in er_update.stdout) or
            (inventory_hostname == 'access_point' and ap_upgrade is unreachable)
          }}

    - name: 5. EdgeRouter - Manual Reboot
      ansible.builtin.raw: reboot
      when: 
        - inventory_hostname == 'edgerouter'
        - needs_reboot | default(false)
      ignore_unreachable: yes
      ignore_errors: yes

    - name: 6. Wait for Reconnect
      ansible.builtin.wait_for_connection:
        delay: 120
        timeout: 600
      when: needs_reboot | default(false)

    - name: 7. Verify Status
      ansible.builtin.raw: >
        {% if inventory_hostname == 'edgerouter' %}
        /opt/vyatta/bin/vyatta-op-cmd-wrapper show version | grep Version
        {% else %}
        mca-cli-op info | grep Version
        {% endif %}
      register: post_update_ver
      ignore_errors: yes

    - name: 8. Final Report
      ansible.builtin.debug:
        msg: "Status for {{ inventory_hostname }}: {{ post_update_ver.stdout | default('Unknown') | trim }}"