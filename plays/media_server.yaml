---
- name: Update Media Server
  hosts: media_server
  become: yes
  vars:
    ansible_become_password: "{{ vault_become_pass }}"
  tasks:
    - name: 1. Upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist

    - name: 2. Update Tailscale
      ansible.builtin.shell: tailscale update
      changed_when: true

    - name: 3. Update Emby Server
      ansible.builtin.apt:
        name: emby-server
        state: latest

    - name: 4. Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: 5. Reboot Media Server
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required_file.stat.exists and not ansible_check_mode

    # --- POST-REBOOT VERIFICATION ---

    - name: Wait for Emby web interface (Local Check)
      ansible.builtin.wait_for:
        port: 8096
        host: 127.0.0.1  # Check against itself
        state: started
        delay: 5
        timeout: 60
      when: not ansible_check_mode

    - name: 7. Gather service status
      ansible.builtin.service_facts:

    - name: 8. Verify Critical Services are Running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['emby-server.service'].state == 'running'
          - ansible_facts.services['tailscaled.service'].state == 'running'
        fail_msg: "One or more critical services failed to start after reboot!"
        success_msg: "All services (Emby, Tailscale) are confirmed running."

    - name: 9. Show Tailscale IP Status
      ansible.builtin.command: tailscale ip -4
      register: ts_ip
      changed_when: false

    - name: 10. Final Status Report
      ansible.builtin.debug:
        msg: "Media Server is back online. Tailscale IP: {{ ts_ip.stdout }}"